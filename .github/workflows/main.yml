name: CI/CD pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            "api-gateway",
            "auth-service",
            "user-service",
            "social-service",
            "post-service",
            "interaction-service",
            "feed-service",
            "frontend",
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Only runs if package.json exists in the folder
      - name: Install Dependencies & Run Tests
        if: hashFiles(format('{0}/package.json', matrix.service)) != ''
        run: |
          cd ${{ matrix.service }}
          npm install
          npm test -- --coverage

      - name: Skip Notification
        if: hashFiles(format('{0}/package.json', matrix.service)) == ''
        run: echo "No package.json found in ${{ matrix.service }}. Skipping tests."


  prepare-timestamp:
    name: Generate Timestamp
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.time.outputs.timestamp }}
    steps:
      - name: Generate yyyymmdd-hhmmss
        id: time
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT


  build-and-push:
    name: Build and Push Docker Images
    needs: [test, prepare-timestamp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          [
            "api-gateway",
            "auth-service",
            "user-service",
            "social-service",
            "post-service",
            "interaction-service",
            "feed-service",
            "frontend",
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Only runs if a Dockerfile exists in the folder
      - name: Check if Dockerfile exists
        id: check_dockerfile
        run: |
          if [ -f "${{ matrix.service }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ needs.prepare-timestamp.outputs.timestamp }}
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
