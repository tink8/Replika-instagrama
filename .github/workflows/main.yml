name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_REGISTRY: tink8
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - post-service
          - interaction-service
          - social-service
          - feed-service
          - frontend
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies for ${{ matrix.service }}
        run: |
          if [ -d "${{ matrix.service }}" ]; then
            cd ${{ matrix.service }}
            npm install
          fi

      - name: Run tests for ${{ matrix.service }}
        run: |
          if [ -f "${{ matrix.service }}/package.json" ]; then
            cd ${{ matrix.service }}
            npm test
          else
            echo "Skipping ${{ matrix.service }} - no package.json found"
          fi

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - post-service
          - interaction-service
          - social-service
          - feed-service
          - frontend
    steps:
      - uses: actions/checkout@v3

      - name: Generate Timestamp Tag
        id: timestamp
        run: echo "tag=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ steps.timestamp.outputs.tag }}
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:buildcache,mode=max

      - name: Display Docker Image Information
        run: |
          echo "Docker image created and pushed successfully."
          echo "Image: ${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}:${{ steps.timestamp.outputs.tag }}"
          echo "Timestamp format: yyyymmdd-hhmmss"
          echo "Repository: https://hub.docker.com/r/${{ env.IMAGE_REGISTRY }}/${{ matrix.service }}"
