services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./auth-service/database/init.sql:/docker-entrypoint-initdb.d/10-auth-init.sql:ro
      - ./user-service/database/init.sql:/docker-entrypoint-initdb.d/20-user-init.sql:ro
      - ./post-service/database/init.sql:/docker-entrypoint-initdb.d/30-post-init.sql:ro
      - ./interaction-service/database/init.sql:/docker-entrypoint-initdb.d/40-interaction-init.sql:ro
      - ./social-service/database.sql:/docker-entrypoint-initdb.d/50-social-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - instagram-net

  minio:
    image: minio/minio
    container_name: minio
    restart: always
    ports:
      - "${MINIO_PORT}:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - instagram-net

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - instagram-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    env_file:
      - ./.env
      - ./api-gateway/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      POST_SERVICE_URL: http://post-service:8003
      SOCIAL_SERVICE_URL: http://social-service:8004
      FEED_SERVICE_URL: http://feed-service:8005
      INTERACTION_SERVICE_URL: http://interaction-service:8006
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
    ports:
      - "${API_GATEWAY_PORT}:8000"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      post-service:
        condition: service_started
      interaction-service:
        condition: service_started
      social-service:
        condition: service_started
      feed-service:
        condition: service_started
    networks:
      - instagram-net

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./auth-service/.env
    environment:
      DB_HOST: mysql-db
      USER_SERVICE_URL: http://user-service:8002
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
      JWT_PRIVATE_KEY_PATH: /usr/src/keys/private.pem
    ports:
      - "${AUTH_SERVICE_PORT}:8001"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      mysql-db:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - instagram-net

  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./user-service/.env
    environment:
      DB_HOST: mysql-db
      MINIO_ENDPOINT: minio
      POST_SERVICE_URL: http://post-service:8003
      SOCIAL_SERVICE_URL: http://social-service:8004
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
    ports:
      - "${USER_SERVICE_PORT}:8002"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      mysql-db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - instagram-net

  post-service:
    build: ./post-service
    container_name: post-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./post-service/.env
    environment:
      DB_HOST: mysql-db
      MINIO_ENDPOINT: minio
      INTERACTION_SERVICE_URL: http://interaction-service:8006
      SOCIAL_SERVICE_URL: http://social-service:8004
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
    ports:
      - "${POST_SERVICE_PORT}:8003"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      mysql-db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - instagram-net

  interaction-service:
    build: ./interaction-service
    container_name: interaction-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./interaction-service/.env
    environment:
      DB_HOST: mysql-db
      POST_SERVICE_URL: http://post-service:8003
      USER_SERVICE_URL: http://user-service:8002
      SOCIAL_SERVICE_URL: http://social-service:8004
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
    ports:
      - "${INTERACTION_SERVICE_PORT}:8006"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      mysql-db:
        condition: service_healthy
      user-service:
        condition: service_started
      post-service:
        condition: service_started
    networks:
      - instagram-net

  social-service:
    build: ./social-service
    container_name: social-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: mysql-db
      USER_SERVICE_URL: http://user-service:8002
      INTERACTION_SERVICE_URL: http://interaction-service:8006
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
    ports:
      - "${SOCIAL_SERVICE_PORT}:8004"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      mysql-db:
        condition: service_healthy
      user-service:
        condition: service_started
      interaction-service:
        condition: service_started
    networks:
      - instagram-net

  feed-service:
    build: ./feed-service
    container_name: feed-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SOCIAL_SERVICE_URL: http://social-service:8004
      POST_SERVICE_URL: http://post-service:8003
      USER_SERVICE_URL: http://user-service:8002
      INTERACTION_SERVICE_URL: http://interaction-service:8006
      JWT_PUBLIC_KEY_PATH: /usr/src/keys/public.pem
    ports:
      - "${FEED_SERVICE_PORT}:8005"
    volumes:
      - ./keys:/usr/src/keys:ro
    depends_on:
      social-service:
        condition: service_started
      post-service:
        condition: service_started
      user-service:
        condition: service_started
      interaction-service:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - instagram-net

networks:
  instagram-net:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
